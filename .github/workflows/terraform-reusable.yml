name: Terraform Reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      working_directory:
        required: true
        type: string
      var_file:
        required: true
        type: string
      backend_config:
        required: true
        type: string
      apply:
        required: false
        type: boolean
        default: false
      destroy:
        required: false
        type: boolean
        default: false

jobs:
  terraform:
    name: Terraform ${{ inputs.apply && 'Apply' || inputs.destroy && 'Destroy' || 'Plan' }} — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    permissions:
      contents: read

    env:
      TF_VAR_snowflake_private_key: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init -input=false -backend-config="${{ inputs.backend_config }}"

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate
  
      - name: Terraform Apply (region query)
        if: ${{ inputs.apply }}
        working-directory: ${{ inputs.working_directory }}
        run: |
          terraform apply -no-color -input=false -auto-approve \
            -var-file="${{ inputs.var_file }}" \
            -target=module.region_cloud.snowflake_execute.region_cloud

      - name: Terraform Plan
        if: ${{ !inputs.destroy }}
        working-directory: ${{ inputs.working_directory }}
        run: terraform plan -no-color -input=false -var-file="${{ inputs.var_file }}" -out=tfplan

      - name: Terraform Apply
        if: ${{ inputs.apply }}
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan

      - name: Terraform Destroy
        if: ${{ inputs.destroy }}
        working-directory: ${{ inputs.working_directory }}
        run: terraform destroy -auto-approve -input=false -var-file="${{ inputs.var_file }}"

name: Terraform Reusable

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
        description: "Target environment (dev, test, prod)"
      working_directory:
        required: true
        type: string
        description: "Path to the Terraform environment folder"
      apply:
        required: false
        type: boolean
        default: false
        description: "Whether to run terraform apply"
    secrets:
      # ── Snowflake connection (repo secrets) ────────────────────
      SNOWFLAKE_PRIVATE_KEY:
        required: true
      SNOWFLAKE_ORGANIZATION_NAME:
        required: true
      SNOWFLAKE_ACCOUNT_NAME:
        required: true
      SNOWFLAKE_USER:
        required: true
      SNOWFLAKE_ROLE:
        required: true
      # ── Per-environment values (environment secrets) ───────────
      TF_VAR_EDC_DB:
        required: true
      TF_VAR_SOURCE_DB:
        required: true
      TF_VAR_TARGET_ACCOUNT:
        required: true
      TF_VAR_ACCESS_DB:
        required: true
      TF_VAR_ACCESS_SCHEMA:
        required: true
      TF_VAR_ACCESS_TABLE:
        required: true
      TF_VAR_WAREHOUSE:
        required: true
      TF_VAR_TARGET_LAG_MAXIMUM_DURATION:
        required: true

jobs:
  terraform:
    name: Terraform ${{ inputs.apply && 'Apply' || 'Plan' }} — ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    env:
      # Snowflake connection
      TF_VAR_snowflake_organization_name:  ${{ secrets.SNOWFLAKE_ORGANIZATION_NAME }}
      TF_VAR_snowflake_account_name:       ${{ secrets.SNOWFLAKE_ACCOUNT_NAME }}
      TF_VAR_snowflake_user:               ${{ secrets.SNOWFLAKE_USER }}
      TF_VAR_snowflake_role:               ${{ secrets.SNOWFLAKE_ROLE }}
      TF_VAR_snowflake_authenticator:      "SNOWFLAKE_JWT"
      TF_VAR_snowflake_private_key_path:   "/tmp/snowflake_key.p8"

      # Per-environment values
      TF_VAR_edc_db:                       ${{ secrets.TF_VAR_EDC_DB }}
      TF_VAR_source_db:                    ${{ secrets.TF_VAR_SOURCE_DB }}
      TF_VAR_target_account:               ${{ secrets.TF_VAR_TARGET_ACCOUNT }}
      TF_VAR_access_db:                    ${{ secrets.TF_VAR_ACCESS_DB }}
      TF_VAR_access_schema:                ${{ secrets.TF_VAR_ACCESS_SCHEMA }}
      TF_VAR_access_table:                 ${{ secrets.TF_VAR_ACCESS_TABLE }}
      TF_VAR_warehouse:                    ${{ secrets.TF_VAR_WAREHOUSE }}
      TF_VAR_target_lag_maximum_duration:  ${{ secrets.TF_VAR_TARGET_LAG_MAXIMUM_DURATION }}

    steps:
      # ── Setup ────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Write private key to file
        run: |
          echo "${{ secrets.SNOWFLAKE_PRIVATE_KEY }}" > /tmp/snowflake_key.p8
          chmod 600 /tmp/snowflake_key.p8

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"
          terraform_wrapper: true

      # ── Validate ─────────────────────────────────────────────────
      - name: Terraform Init
        working-directory: ${{ inputs.working_directory }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ inputs.working_directory }}
        run: terraform validate

      # ── Plan ─────────────────────────────────────────────────────
      - name: Terraform Plan
        id: plan
        working-directory: ${{ inputs.working_directory }}
        run: terraform plan -out=tfplan -detailed-exitcode 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ inputs.working_directory }}/plan_output.txt', 'utf8');
            const truncated = plan.length > 60000 ? plan.substring(0, 60000) + '\n... (truncated)' : plan;
            const status = '${{ steps.plan.outcome }}' === 'success' ? '✅' : '❌';
            const body = `### ${status} Terraform Plan — \`${{ inputs.environment }}\`
            <details><summary>Show Plan</summary>

            \`\`\`hcl
            ${truncated}
            \`\`\`
            </details>

            *Triggered by @${{ github.actor }} on \`${{ github.head_ref }}\`*`;

            // Replace previous plan comment for this environment
            const comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            for (const comment of comments.data) {
              if (comment.body.includes(`Terraform Plan — \`${{ inputs.environment }}\``)) {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: comment.id,
                });
              }
            }
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      # ── Block merge if plan failed ────────────────────────────────
      - name: Fail if plan errored
        if: steps.plan.outcome == 'failure'
        run: |
          echo "❌ Terraform plan failed for ${{ inputs.environment }} — merge is blocked."
          exit 1

      # ── Apply ─────────────────────────────────────────────────────
      - name: Terraform Apply
        if: ${{ inputs.apply && steps.plan.outputs.exitcode == '2' }}
        working-directory: ${{ inputs.working_directory }}
        run: terraform apply -auto-approve tfplan

      - name: Skip — no changes detected
        if: ${{ inputs.apply && steps.plan.outputs.exitcode == '0' }}
        run: echo "No changes detected — skipping apply."

      # ── Cleanup ──────────────────────────────────────────────────
      - name: Clean up private key
        if: always()
        run: rm -f /tmp/snowflake_key.p8

name: Terraform Promote

on:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Branch, tag, or commit SHA to deploy"
        required: false
        default: "main"
      deploy_na:
        description: "Deploy NA flow"
        required: true
        type: boolean
        default: true
      deploy_apac:
        description: "Deploy APAC flow"
        required: true
        type: boolean
        default: true

concurrency:
  group: terraform-promote
  cancel-in-progress: false

jobs:
  deploy-preprod-na:
    if: ${{ inputs.deploy_na }}
    name: Deploy — preprod-na
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-na
      working_directory: environments/preprod-na
      apply: true
    secrets: inherit

  deploy-prod-na:
    if: ${{ inputs.deploy_na }}
    name: Deploy — prod-na
    needs: deploy-preprod-na
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-na
      working_directory: environments/prod-na
      apply: true
    secrets: inherit

  deploy-preprod-apac:
    if: ${{ inputs.deploy_apac }}
    name: Deploy — preprod-apac
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-apac
      working_directory: environments/preprod-apac
      apply: true
    secrets: inherit

  deploy-prod-apac:
    if: ${{ inputs.deploy_apac }}
    name: Deploy — prod-apac
    needs: deploy-preprod-apac
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-apac
      working_directory: environments/prod-apac
      apply: true
    secrets: inherit

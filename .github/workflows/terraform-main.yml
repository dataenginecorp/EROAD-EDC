name: Terraform Deploy Lower Envs

on:
  push:
    branches: [main]
    paths:
      - 'environments/**'
      - 'modules/**'
      - 'sql/**'

concurrency:
  group: terraform-main-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy — dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: dev
      working_directory: environments/dev
      apply: true
    secrets: inherit

  deploy-test:
    name: Deploy — test
    needs: deploy-dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: test
      working_directory: environments/test
      apply: true
    secrets: inherit
    

name: Terraform Deploy

on:
  workflow_dispatch:

concurrency:
  group: terraform-deploy-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  deploy-dev:
    name: Deploy — dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: dev
      working_directory: environments/dev
      apply: true
    secrets: inherit

  deploy-test:
    name: Deploy — test
    needs: deploy-dev
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: test
      working_directory: environments/test
      apply: true
    secrets: inherit

  deploy-preprod-na:
    name: Deploy — preprod-na
    needs: deploy-test
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-na
      working_directory: environments/preprod-na
      apply: true
    secrets: inherit

  gate-na:
    name: Gate approval — NA
    needs: deploy-preprod-na
    runs-on: ubuntu-latest
    environment: prod-na-gate
    steps:
      - name: Await approval
        run: echo "Approved to continue to prod-na."

  deploy-prod-na:
    name: Deploy — prod-na
    needs: gate-na
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-na
      working_directory: environments/prod-na
      apply: true
    secrets: inherit

  deploy-preprod-apac:
    name: Deploy — preprod-apac
    needs: deploy-test
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-apac
      working_directory: environments/preprod-apac
      apply: true
    secrets: inherit

  gate-apac:
    name: Gate approval — APAC
    needs: deploy-preprod-apac
    runs-on: ubuntu-latest
    environment: prod-apac-gate
    steps:
      - name: Await approval
        run: echo "Approved to continue to prod-apac."

  deploy-prod-apac:
    name: Deploy — prod-apac
    needs: gate-apac
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-apac
      working_directory: environments/prod-apac
      apply: true
    secrets: inherit

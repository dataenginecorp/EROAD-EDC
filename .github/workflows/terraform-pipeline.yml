name: Terraform CI/CD Pipeline

# ─────────────────────────────────────────────────────────────────────────────
# BRANCH STRATEGY
#
# main                →  apply dev → test
# release/v*          →  apply dev → test → preprod-apac + preprod-na
# release/apac/v*     →  apply dev → test → preprod-apac only
# release/na/v*       →  apply dev → test → preprod-na only
# pull_request        →  plan only (no apply)
# workflow_dispatch   →  manually run any environment with plan/apply/destroy
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches: [main, release/**]
    paths: [terraform/**, environments/**, modules/**]

  pull_request:
    branches: [main, release/**]
    paths: [terraform/**, environments/**, modules/**]

  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, test, preprod-apac, preprod-na, prod-apac, prod-na]
      action:
        description: Action
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:

  # ── DEV ─────────────────────────────────────────────────────────────────────
  dev:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: dev
      working_directory: ./terraform
      apply: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
      destroy: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}

  # ── TEST ─────────────────────────────────────────────────────────────────────
  test:
    needs: dev
    if: |
      always() && needs.dev.result == 'success' && (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: test
      working_directory: ./terraform
      apply: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
      destroy: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}

  # ── PREPROD APAC ─────────────────────────────────────────────────────────────
  preprod-apac:
    needs: test
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && (
          startsWith(github.ref, 'refs/heads/release/v') ||
          startsWith(github.ref, 'refs/heads/release/apac/')
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'preprod-apac')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-apac
      working_directory: ./terraform
      apply: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
      destroy: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}

  # ── PREPROD NA ───────────────────────────────────────────────────────────────
  preprod-na:
    needs: test
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && (
          startsWith(github.ref, 'refs/heads/release/v') ||
          startsWith(github.ref, 'refs/heads/release/na/')
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'preprod-na')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: preprod-na
      working_directory: ./terraform
      apply: ${{ github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply') }}
      destroy: ${{ github.event_name == 'workflow_dispatch' && inputs.action == 'destroy' }}

  # ── PROD APAC — manual only ──────────────────────────────────────────────────
  prod-apac:
    needs: [preprod-apac, preprod-na]
    if: |
      always() && needs.preprod-apac.result == 'success' &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'prod-apac'
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-apac
      working_directory: ./terraform
      apply: ${{ inputs.action == 'apply' }}
      destroy: ${{ inputs.action == 'destroy' }}

  # ── PROD NA — manual only ────────────────────────────────────────────────────
  prod-na:
    needs: [preprod-apac, preprod-na]
    if: |
      always() && needs.preprod-na.result == 'success' &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'prod-na'
    uses: ./.github/workflows/terraform-reusable.yml
    with:
      environment: prod-na
      working_directory: ./terraform
      apply: ${{ inputs.action == 'apply' }}
      destroy: ${{ inputs.action == 'destroy' }}
name: Terraform CI/CD Pipeline

on:
  push:
    branches: [main, release/**]
    paths: [terraform/**, environments/**, modules/**]

  pull_request:
    branches: [main, release/**]
    paths: [terraform/**, environments/**, modules/**]

  workflow_dispatch:
    inputs:
      environment:
        description: Environment
        required: true
        type: choice
        options: [dev, test, preprod-apac, preprod-na, prod-apac, prod-na]
      action:
        description: Action
        required: true
        type: choice
        options: [plan, apply, destroy]
        default: plan

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

jobs:

  dev:
    if: |
      github.event_name == 'pull_request' ||
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && inputs.environment == 'dev')
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: dev
      working_directory: ./terraform
      var_file: ../environments/dev/terraform.tfvars
      backend_config: ../environments/dev/backend.hcl
      apply: ${{ fromJSON(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) }}
      destroy: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.action == 'destroy') }}

  test:
    needs: dev
    if: |
      always() && needs.dev.result == 'success' && (
        github.event_name == 'pull_request' ||
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'test')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: test
      working_directory: ./terraform
      var_file: ../environments/test/terraform.tfvars
      backend_config: ../environments/test/backend.hcl
      apply: ${{ fromJSON(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) }}
      destroy: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.action == 'destroy') }}

  preprod-apac:
    needs: test
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && (
          startsWith(github.ref, 'refs/heads/release/v') ||
          startsWith(github.ref, 'refs/heads/release/apac/')
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'preprod-apac')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: preprod-apac
      working_directory: ./terraform
      var_file: ../environments/preprod-apac/terraform.tfvars
      backend_config: ../environments/preprod-apac/backend.hcl
      apply: ${{ fromJSON(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) }}
      destroy: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.action == 'destroy') }}

  preprod-na:
    needs: test
    if: |
      always() && needs.test.result == 'success' && (
        (github.event_name == 'push' && (
          startsWith(github.ref, 'refs/heads/release/v') ||
          startsWith(github.ref, 'refs/heads/release/na/')
        )) ||
        (github.event_name == 'workflow_dispatch' && inputs.environment == 'preprod-na')
      )
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: preprod-na
      working_directory: ./terraform
      var_file: ../environments/preprod-na/terraform.tfvars
      backend_config: ../environments/preprod-na/backend.hcl
      apply: ${{ fromJSON(github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.action == 'apply')) }}
      destroy: ${{ fromJSON(github.event_name == 'workflow_dispatch' && inputs.action == 'destroy') }}

  prod-apac:
    needs: [preprod-apac, preprod-na]
    if: |
      always() && needs.preprod-apac.result == 'success' &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'prod-apac'
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: prod-apac
      working_directory: ./terraform
      var_file: ../environments/prod-apac/terraform.tfvars
      backend_config: ../environments/prod-apac/backend.hcl
      apply: ${{ fromJSON(inputs.action == 'apply') }}
      destroy: ${{ fromJSON(inputs.action == 'destroy') }}

  prod-na:
    needs: [preprod-apac, preprod-na]
    if: |
      always() && needs.preprod-na.result == 'success' &&
      github.event_name == 'workflow_dispatch' && inputs.environment == 'prod-na'
    uses: ./.github/workflows/terraform-reusable.yml
    secrets: inherit
    with:
      environment: prod-na
      working_directory: ./terraform
      var_file: ../environments/prod-na/terraform.tfvars
      backend_config: ../environments/prod-na/backend.hcl
      apply: ${{ fromJSON(inputs.action == 'apply') }}
      destroy: ${{ fromJSON(inputs.action == 'destroy') }}